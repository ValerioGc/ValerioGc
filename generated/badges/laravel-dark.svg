<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="119" height="32" role="img">
  <title>Laravel</title>
  <!-- background -->
  <rect width="119" height="32" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <!-- colored left border (two rects: rounded rect + flush fill to square off right side) -->
  <rect width="3" height="32" rx="1.5" fill="#FF2D20"/>
  <rect x="1.5" width="1.5" height="32" fill="#FF2D20"/>
  <!-- icon -->
  <rect x="8" y="6" width="20" height="20" rx="3" fill="#FF2D20" opacity="0.25"/>
  <text x="18" y="20" font-family="monospace" font-size="9" font-weight="700" text-anchor="middle" fill="#e6edf3">LA</text>
  <!-- label -->
  <text x="35" y="20.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" font-weight="500" fill="#e6edf3">Laravel</text>
</svg>